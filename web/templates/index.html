<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>tundralis · KDA upload</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <main class="shell">
    <section class="hero card">
      <div class="eyebrow">tundralis</div>
      <h1>Upload a survey file</h1>
      <p class="sub">Thin golden path: upload CSV → review columns → run KDA → download deck + JSON.</p>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form action="/inspect" method="post" enctype="multipart/form-data" class="upload-form">
        <label class="upload-box">
          <span>Choose CSV</span>
          <input type="file" name="survey_file" accept=".csv" required>
        </label>
        <button type="submit">Inspect columns</button>
      </form>
    </section>
  </main>
</body>
</html>
