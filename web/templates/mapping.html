<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>tundralis · mapping review</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <main class="shell wide">
    <section class="card">
      <div class="eyebrow">tundralis</div>
      <h1>Review mapping</h1>
      <p class="sub">File: <strong>{{ filename }}</strong></p>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form action="/run" method="post" class="mapping-grid">
        <input type="hidden" name="job_id" value="{{ job_id }}">
        <input type="hidden" name="filename" value="{{ filename }}">

        <div class="card inner">
          <h2>Target</h2>
          <select name="target_column" required>
            {% for col in numeric_columns %}
            <option value="{{ col }}" {% if col == inferred_target %}selected{% endif %}>{{ col }}</option>
            {% endfor %}
          </select>

          <h2>Respondent ID</h2>
          <select name="respondent_id_column">
            <option value="">None</option>
            {% for col in columns %}
            <option value="{{ col }}">{{ col }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="card inner">
          <h2>Predictors</h2>
          <div class="checklist">
            {% for col in numeric_columns %}
            <label><input type="checkbox" name="predictor_columns" value="{{ col }}" {% if col in inferred_predictors %}checked{% endif %}> {{ col }}</label>
            {% endfor %}
          </div>
        </div>

        <div class="card inner">
          <h2>Segments</h2>
          <div class="checklist">
            {% for col in columns %}
            <label><input type="checkbox" name="segment_columns" value="{{ col }}"> {{ col }}</label>
            {% endfor %}
          </div>

          <h2>Exclude from model</h2>
          <div class="checklist">
            {% for col in columns %}
            <label><input type="checkbox" name="excluded_columns" value="{{ col }}"> {{ col }}</label>
            {% endfor %}
          </div>
        </div>

        <div class="actions"><button type="submit">Run KDA</button></div>
      </form>
    </section>
  </main>
</body>
</html>
